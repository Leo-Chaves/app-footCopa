services:
  postgres:
    image: postgres:16-alpine
    container_name: copa-replay-postgres
    environment:
      POSTGRES_DB: copa_replay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - copa_replay_data:/var/lib/postgresql/data

volumes:
  copa_replay_data:
